<!DOCTYPE html>
<html>
<head>
  <title>AI Mock Interviewer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    /* ---------------- SIDEBAR ---------------- */

    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #0b1220, #060c1a);
      padding: 30px 20px;
    }

    .sidebar h2 {
      font-weight: 600;
      margin-bottom: 40px;
      font-size: 22px;
      line-height: 1.4;
    }

    .sidebar a {
      display: block;
      padding: 12px 14px;
      border-radius: 10px;
      color: #9ca3af;
      text-decoration: none;
      margin-bottom: 10px;
      transition: 0.3s;
      font-size: 14px;
    }

    .sidebar a.active {
      background: linear-gradient(90deg, #6366f1, #4f46e5);
      color: white;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.05);
      color: white;
    }

    /* ---------------- MAIN ---------------- */

    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 520px;
      padding: 55px 50px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .card h2 {
      text-align: center;
      margin-bottom: 35px;
      font-weight: 500;
    }

    .card input,
    .card textarea {
      width: 100%;
      padding: 16px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: white;
      margin-bottom: 20px;
      font-size: 14px;
      outline: none;
    }

    .card textarea {
      height: 130px;
      resize: none;
    }

    .upload-row {
      display: flex;
      gap: 20px;
      margin: 20px 0 30px 0;
    }

    .upload-box {
      flex: 1;
      padding: 25px 10px;
      border-radius: 14px;
      border: 1px dashed rgba(255,255,255,0.25);
      text-align: center;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      transition: 0.3s ease;
    }

    .upload-box:hover {
      background: rgba(255,255,255,0.08);
    }

    .upload-box input {
      display: none;
    }

    .upload-icon {
      display: block;
      font-size: 22px;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .start-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 500;
      background: linear-gradient(90deg, #1d4ed8, #2563eb);
      color: white;
      cursor: pointer;
      opacity: 0.4;
      transition: 0.3s ease;
    }

    .start-btn.active {
      opacity: 1;
    }

  </style>
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>AI Mock<br>Interviewer</h2>
    <a class="active">Profile Setup</a>
    <a>Interview</a>
    <a>Results</a>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="card">
      <h2>Candidate Set-Up</h2>

      <form method="POST" enctype="multipart/form-data">

        <input name="name" placeholder="Candidate Name*" required>
        <input name="role" placeholder="Job role*" required>
    


        <textarea name="jd_text" placeholder="Paste Job Description (optional if uploading PDF)"></textarea>

        <div class="upload-row">

          <label class="upload-box">
            <input type="file" name="resume_file" accept=".pdf" required>
            <span class="upload-icon">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="1.8"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 16V4"/>
    <path d="M7 9l5-5 5 5"/>
    <path d="M4 20h16"/>
  </svg>
</span>

            Upload Resume*
          </label>

          <label class="upload-box">
            <input type="file" name="jd_file" accept=".pdf">
            <span class="upload-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="1.8"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 16V4"/>
    <path d="M7 9l5-5 5 5"/>
    <path d="M4 20h16"/>
  </svg>
</span>

            Upload Job Description
          </label>

        </div>

        <button id="startBtn" class="start-btn" disabled>
          Start Interview
        </button>

      </form>
    </div>

  </div>
</div>

<script>
const form = document.querySelector("form");
const btn = document.getElementById("startBtn");

form.addEventListener("input", () => {
    const name = form.name.value.trim();
    const role = form.role.value.trim();
    const jdText = form.jd_text.value.trim();
    const jdFile = form.jd_file.files.length;
    const resume = form.resume_file.files.length;

    if (name && role && (jdText || jdFile) && resume) {
        btn.disabled = false;
        btn.classList.add("active");
    } else {
        btn.disabled = true;
        btn.classList.remove("active");
    }
});
</script>

</body>
</html>
