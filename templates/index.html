<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Mock Interview – Setup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #020617;
      padding: 30px;
      border-radius: 12px;
      width: 400px;
    }
    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
    }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Candidate Details</h2>

  <form method="POST" action="/" enctype="multipart/form-data">

  <label>Candidate Name</label>
  <input type="text" name="name" required>

  <label>Job Role</label>
  <input type="text" name="role" required>

  <label>Upload Resume (PDF)</label>
  <input type="file" name="resume" accept=".pdf" required>

  <label>Upload Job Description (PDF or TXT)</label>
  <input type="file" name="jd_file" accept=".pdf,.txt" required>

  <button type="submit">Continue to Interview</button>

</form>

</div>

</body>
</html>
